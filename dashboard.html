<body>

  <div class="logo">NutriSmart</div>

  <ul class="nav-links">

<section class="dashboard-page">

  <h1>Health Dashboard</h1>

  <div class="dashboard-grid">

    <div class="dashboard-card">
      <h2>Water Intake</h2>

      <input type="number" id="waterInput" placeholder="Enter glasses">

      <button onclick="saveWater()">Save</button>

      <h3 id="waterResult">0 Glasses</h3>
    </div>

    <div class="dashboard-card">
      <h2>Calories Today</h2>

      <input type="number" id="calorieInput" placeholder="Enter calories">

      <button onclick="saveCalories()">Save</button>

      <h3 id="calorieResult">0 kcal</h3>
    </div>

    <div class="dashboard-card">
      <h2>Sleep Hours</h2>

      <input type="number" id="sleepInput" placeholder="Enter sleep hours">

      <button onclick="saveSleep()">Save</button>

      <h3 id="sleepResult">0 Hours</h3>
    </div>

  </div>

  <div class="chart-container">
    <canvas id="healthChart"></canvas>
  </div>

</section>

<script src="js/script.js"></script>

</body>
</html>

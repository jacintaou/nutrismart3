<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Nutrition Analyser</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar">
  <div class="logo">NutriSmart</div>

  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="analyser.html">Nutrition Analyser</a></li>
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="mealplans.html">Meal Plans</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>

<section class="analyser-page">

  <h1>Nutrition Analyser</h1>

  <p>
    Select a food item to receive nutritional insights,
    health ratings and healthier alternatives.
  </p>

  <div class="analyser-box">

    <select id="foodSelect">

      <option value="">Select Food</option>

      <option value="pizza">Pizza</option>
      <option value="burger">Burger</option>
      <option value="salad">Salad</option>
      <option value="apple">Apple</option>
      <option value="fries">Fries</option>
      <option value="friedChicken">Fried Chicken</option>
      <option value="proteinShake">Protein Shake</option>
      <option value="iceCream">Ice Cream</option>
      <option value="sushi">Sushi</option>
      <option value="steak">Steak</option>

    </select>

    <button onclick="analyseFood()">Analyse Food</button>

  </div>

  <div class="results-card" id="resultsCard">

    <img id="foodImage" src="" alt="">

    <h2 id="foodName"></h2>

    <div class="macro-grid">

      <div class="macro-card">
        <h3>Calories</h3>
        <p id="calories"></p>
      </div>

      <div class="macro-card">
        <h3>Protein</h3>
        <p id="protein"></p>
      </div>

      <div class="macro-card">
        <h3>Carbs</h3>
        <p id="carbs"></p>
      </div>

      <div class="macro-card">
        <h3>Fat</h3>
        <p id="fat"></p>
      </div>

    </div>

    <div class="health-rating">
      <h3>Health Rating</h3>
      <div class="rating-bar">
        <div id="ratingFill"></div>
      </div>

      <p id="healthScore"></p>
    </div>

    <div class="swap-box">
      <h3>Healthy Swap</h3>
      <p id="healthySwap"></p>
    </div>

  </div>

</section>

<script src="js/script.js"></script>

</body>
</html>
